version: '3.8'

services:
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env
    environment:
      - MONGO_URI=${MONGO_URI}
      - SESSION_SECRET=${SESSION_SECRET}
      - NODE_ENV=development
    ports:
      - "5000:5000"
    volumes:
      - ./server:/app/server
      - ./shared:/app/shared
    command: npm run dev
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: dev
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://localhost:5000
      - NODE_ENV=development
    ports:
      - "3000:3000"
    volumes:
      - ./client:/app
      - ./shared:/app/shared
    command: npm run dev
    depends_on:
      - server

volumes:
  mongo-data:
